[patch.crates-io]
# `cargo osdk` builds generated helper crates under `target/osdk`, so these
# dependency pinning workarounds need to live in Cargo config to cover both
# workspace builds and generated helper crates.
core2 = { git = "https://github.com/bbqsrc/core2", rev = "545e84bcb0f235b12e21351e0c69767958efe2a7" }
libflate = { git = "https://github.com/sile/libflate", rev = "6676d36d381eec60f376337e528d658b16c87c7a" }
libflate_lz77 = { git = "https://github.com/sile/libflate", rev = "6676d36d381eec60f376337e528d658b16c87c7a" }
